<!-- Add this in <head> -->
<meta http-equiv="status" content="404"><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* VHS tracking lines */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 8px,
                rgba(255,255,255,0.05) 8px,
                rgba(255,255,255,0.05) 10px
            );
            animation: vhs 8s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes vhs {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        /* Animated neon gradient background */
        .bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #ffff00);
            background-size: 400% 400%;
            animation: gradient 20s ease infinite;
            opacity: 0.8;
            z-index: -2;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Palm trees and grid */
        .retro-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, #ff00ff 0%, transparent 20%),
                radial-gradient(circle at 80% 80%, #00ffff 0%, transparent 20%),
                repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,0,255,0.1) 20px, rgba(255,0,255,0.1) 40px);
            z-index: -1;
        }

        h1 {
            font-size: 12rem;
            margin: 0;
            color: #ffff00;
            text-shadow: 
                0 0 20px #ff00ff,
                8px 8px 0 #00ffff,
                -8px -8px 0 #ff00ff,
                0 0 40px #000;
            letter-spacing: 0.15em;
            animation: mega-glitch 1.5s infinite;
        }

        @keyframes mega-glitch {
            0%, 100% { 
                text-shadow: 8px 8px 0 #ff00ff, -8px -8px 0 #00ffff; 
                transform: translate(0);
            }
            20% { 
                text-shadow: -8px -8px 0 #ff00ff, 8px 8px 0 #00ffff; 
                transform: translate(10px, -10px);
            }
            40% { 
                text-shadow: 8px -8px 0 #ff00ff, -8px 8px 0 #00ffff; 
                transform: translate(-10px, 10px);
            }
            60% { 
                text-shadow: 0 0 40px #ffff00; 
                transform: translate(5px, 5px);
            }
        }

        p.main {
            font-size: 3.5rem;
            margin: 30px 0 10px;
            color: #00ffff;
            text-shadow: 0 0 30px #ff00ff, 0 0 50px #ff00ff;
            animation: flicker 3s infinite;
        }

        p.subtitle {
            font-size: 2rem;
            color: #ff00ff;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 50px;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            75% { opacity: 0.95; }
        }

        .emoji {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: mega-pulse 2s infinite, float 6s ease-in-out infinite;
            text-shadow: 0 0 40px #ffff00;
        }

        @keyframes mega-pulse {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.4) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        a {
            display: inline-block;
            padding: 20px 60px;
            font-size: 2.5rem;
            color: #000;
            background: linear-gradient(45deg, #ffff00, #ff00ff);
            border: 10px double #00ffff;
            box-shadow: 
                0 0 40px #ffff00,
                inset 0 0 20px #ff00ff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.2em;
            animation: ultra-neon 1s infinite alternate, bounce 2s infinite;
            transition: all 0.4s ease;
        }

        a:hover {
            transform: scale(1.1) translateY(-10px);
            box-shadow: 
                0 0 80px #ffff00,
                0 0 100px #ff00ff,
                inset 0 0 40px #00ffff;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: #ffff00;
        }

        @keyframes ultra-neon {
            from { 
                box-shadow: 0 0 20px #ffff00, 0 0 40px #ff00ff, inset 0 0 10px #00ffff; 
            }
            to { 
                box-shadow: 0 0 60px #ffff00, 0 0 80px #ff00ff, 0 0 100px #00ffff, inset 0 0 30px #ffff00; 
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .lionel {
            position: absolute;
            bottom: 30px;
            font-size: 1.8rem;
            color: #ff00ff;
            text-shadow: 0 0 20px #00ffff;
            font-style: italic;
            animation: flicker 4s infinite;
        }

        /* Scan lines */
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1),
                rgba(0,0,0,0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="retro-overlay"></div>
    <div class="emoji">👀</div>
    <h1>404</h1>
    <p class="main">Hello! Is it me you're looking for?</p>
    <p class="subtitle">Sorry, the page you're searching for doesn't exist... like, totally bummer.</p>
    <a href="/">Take me home, dude!</a>
    <div class="lionel">— Maximum tubular tribute to Lionel Richie, circa 1984</div>
    <div class="scanlines"></div>
</body>
</html>
