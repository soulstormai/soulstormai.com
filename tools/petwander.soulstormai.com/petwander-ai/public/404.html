<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 - Page Not Found | PetWander</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Theme -->
    <meta name="theme-color" content="#e8e4dc">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #e8e4dc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        /* 404 Images - Responsive */
        .error-image-desktop {
            width: 100%;
            max-width: 800px;
            height: auto;
            margin: 0 auto 48px;
            display: block;
        }

        .error-image-mobile {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 0 auto 48px;
            display: none;
        }

        /* Button */
        .btn-home {
            display: inline-block;
            background: linear-gradient(135deg, #5a7c5a, #7a9b7a);
            color: white;
            padding: 18px 56px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(90, 124, 90, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(90, 124, 90, 0.4);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* Responsive - Switch images on mobile */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .error-image-desktop {
                display: none;
            }

            .error-image-mobile {
                display: block;
                margin-bottom: 32px;
            }

            .btn-home {
                display: block;
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
                padding: 16px 32px;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container > * {
            animation: fadeIn 0.6s ease-out backwards;
        }

        .error-image-desktop,
        .error-image-mobile {
            animation-delay: 0.1s;
        }

        .btn-home {
            animation-delay: 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Desktop Image (horizontal layout) -->
        <img src="error404.png" alt="404 - Page Not Found" class="error-image-desktop">
        
        <!-- Mobile Image (vertical layout) -->
        <img src="error404_mobile.png" alt="404 - Page Not Found" class="error-image-mobile">

        <!-- Take Me Home Button -->
        <a href="/" class="btn-home">🐕 Take Me Home</a>
    </div>

    <script>
        // Track 404 errors in analytics (if GA is installed)
        if (typeof gtag !== 'undefined') {
            gtag('event', 'page_view', {
                page_title: '404 Error',
                page_location: window.location.href,
                page_path: window.location.pathname
            });

            gtag('event', 'exception', {
                description: '404 Page Not Found: ' + window.location.pathname,
                fatal: false
            });
        }
    </script>
</body>
</html>
